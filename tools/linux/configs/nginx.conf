# nginx.conf — Production-ready nginx configuration
# Tested on nginx 1.18+ / Ubuntu 22.04
#
# Structure:
#   /etc/nginx/nginx.conf          ← this file (global settings)
#   /etc/nginx/sites-available/    ← virtual host configs
#   /etc/nginx/sites-enabled/      ← symlinks to active configs

# ── Global ────────────────────────────────────────────────────────────────────
user www-data;
worker_processes auto;              # one worker per CPU core
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;                      # efficient I/O on Linux
    multi_accept on;
}

http {
    # ── Basics ────────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;              # hide nginx version

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ── SSL defaults ──────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Virtual hosts ─────────────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*;
}


# ════════════════════════════════════════════════════════════════════════════
# Example: sites-available/myapp.conf
# Enable with: ln -s /etc/nginx/sites-available/myapp.conf /etc/nginx/sites-enabled/
# ════════════════════════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    root  /var/www/example.com;
    index index.html;

    # ── Static files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Reverse proxy to Node.js/Gunicorn/etc ─────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";  # WebSocket support
        proxy_read_timeout 60s;

        limit_req zone=api burst=20 nodelay;
    }

    # Rate-limit login endpoint
    location /api/login {
        proxy_pass http://127.0.0.1:3000;
        limit_req zone=login burst=3 nodelay;
    }

    # ── Block common bad requests ─────────────────────────────────────────────
    location ~ /\. { deny all; }                        # hidden files
    location ~* \.(env|git|sql|bak)$ { deny all; }     # sensitive files
}

